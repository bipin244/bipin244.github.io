<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NSE Gainers & Losers Analysis</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 2rem;
            background: #0f1419;
            color: #e6edf3;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .meta {
            color: #8b949e;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }

        .table-wrap {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #30363d;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            background: #21262d;
            padding: 0.75rem 1rem;
            text-align: left;
            font-weight: 600;
            color: #c9d1d9;
            border-bottom: 1px solid #30363d;
        }

        th.sortable {
            cursor: pointer;
            user-select: none;
        }

        th.sortable:hover {
            color: #58a6ff;
        }

        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #21262d;
        }

        tr:hover {
            background: #161b22;
        }

        .symbol {
            font-weight: 600;
            color: #58a6ff;
        }

        .price {
            font-variant-numeric: tabular-nums;
        }

        .positive {
            color: #3fb950;
        }

        .negative {
            color: #f85149;
        }

        .no-data {
            text-align: center;
            padding: 3rem;
            color: #8b949e;
        }

        section {
            margin-bottom: 2.5rem;
        }

        section h2 {
            font-size: 1.15rem;
            margin-bottom: 0.5rem;
        }

        .options-cell {
            font-size: 0.8rem;
        }

        .options-toggle {
            cursor: pointer;
            color: #58a6ff;
            text-decoration: underline;
        }

        .options-detail {
            display: none;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: #161b22;
            border-radius: 4px;
            max-height: 200px;
            overflow: auto;
        }

        .options-detail.show {
            display: block;
        }

        .opt-row {
            display: grid;
            grid-template-columns: 70px 70px 70px 70px 70px;
            gap: 0.5rem;
            padding: 0.35rem 0;
            border-bottom: 1px solid #21262d;
            align-items: center;
        }

        .opt-header {
            font-weight: 600;
            color: #8b949e;
        }

        .opt-ce {
            color: #3fb950;
        }

        .opt-pe {
            color: #f85149;
        }

        .opt-current {
            color: #58a6ff;
        }

        .opt-high {
            color: #3fb950;
        }

        .expiry-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: #161b22;
            border-radius: 8px;
            border: 1px solid #30363d;
        }

        .expiry-bar label {
            font-weight: 500;
            color: #c9d1d9;
        }

        .expiry-bar select {
            padding: 0.5rem 2rem 0.5rem 0.75rem;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .expiry-bar select:hover {
            border-color: #58a6ff;
        }

        .expiry-bar button {
            padding: 0.5rem 1rem;
            background: #238636;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-weight: 500;
            cursor: pointer;
        }

        .expiry-bar button:hover {
            background: #2ea043;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #8b949e;
        }

        .error-msg {
            color: #f85149;
            padding: 1rem;
            background: #161b22;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .expand-collapse-bar {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 1rem;
        }

        .expand-collapse-bar button {
            padding: 0.5rem 1rem;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .expand-collapse-bar button:hover {
            background: #30363d;
            border-color: #58a6ff;
            color: #e6edf3;
        }

        .top-loading {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #c9d1d9;
            font-size: 0.9rem;
        }

        .top-loading.hidden {
            display: none;
        }

        .top-loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: top-loading-spin 0.8s linear infinite;
        }

        @keyframes top-loading-spin {
            to {
                transform: rotate(360deg);
            }
        }

        .top-loading-text {
            flex: 1;
        }
    </style>
</head>

<body>
    <div id="top-loading" class="top-loading" aria-live="polite">
        <div class="top-loading-spinner" aria-hidden="true"></div>
        <span class="top-loading-text" id="top-loading-text">Loading data...</span>
    </div>
    <div id="error-container"></div>
    <div id="expiry-bar" class="expiry-bar"
        style="display:none; display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 0.75rem;">
            <label for="expiry">Expiry Date:</label>
            <select id="expiry">
                <!-- populated by JS -->
            </select>
            <button type="button" id="apply-expiry">Apply</button>
        </div>
        <button type="button" id="toggle-expand-options" style="margin-left: auto;">Expand all</button>
    </div>


    <section>
        <h2>F&O Gainers — Open Price = Low Price</h2>
        <p class="meta" id="gainers-meta">Loading...</p>
        <div class="table-wrap">
            <div id="gainers-content" class="loading">Fetching data...</div>
        </div>
    </section>

    <section>
        <h2>F&O Losers — Open Price = High Price</h2>
        <p class="meta" id="losers-meta">Loading...</p>
        <div class="table-wrap">
            <div id="losers-content" class="loading">Fetching data...</div>
        </div>
    </section>

    <script>
        (function () {
            const HEADERS = {
                'Accept': 'application/json',
                'Accept-Language': 'en-US,en;q=0.9',
                'Referer': 'https://www.nseindia.com/',
            };

            function proxyUrl(url) {
                return 'https://corsproxy.io/?' + encodeURIComponent(url);
            }

            function nseUrlWithNoCache(baseUrl) {
                const sep = baseUrl.includes('?') ? '&' : '?';
                return baseUrl + sep + '_=' + Date.now();
            }

            async function fetchJson(url, skipCacheBust) {
                const finalUrl = skipCacheBust ? url : nseUrlWithNoCache(url);
                const res = await fetch(proxyUrl(finalUrl), {
                    headers: HEADERS,
                    credentials: 'omit',
                    cache: 'no-store',
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return res.json();
            }

            async function fetchNseData(index) {
                const url = 'https://www.nseindia.com/api/live-analysis-variations?index=' + encodeURIComponent(index);
                return fetchJson(url);
            }

            async function fetchOptionChainContractInfo(symbol) {
                const url = 'https://www.nseindia.com/api/option-chain-contract-info?symbol=' + encodeURIComponent(symbol);
                return fetchJson(url);
            }

            /** Convert expiry to DD-MMM-YYYY for GetQuoteApi (e.g. 24-Feb-2026) */
            function formatExpiryForApi(expiry) {
                if (!expiry || typeof expiry !== 'string') return expiry;
                const s = expiry.trim();
                if (/^\d{2}-[A-Za-z]{3}-\d{4}$/.test(s)) return s;
                const m = s.match(/^(\d{1,2})([A-Za-z]{3})(\d{4})$/i);
                if (m) return m[1].padStart(2, '0') + '-' + m[2].charAt(0).toUpperCase() + m[2].slice(1).toLowerCase() + '-' + m[3];
                const d = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
                if (d) {
                    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                    return d[3] + '-' + months[parseInt(d[2], 10) - 1] + '-' + d[1];
                }
                return s;
            }

            async function fetchSymbolDerivativesData(symbol, optionType, expiryDt) {
                const url = 'https://www.nseindia.com/api/NextApi/apiClient/GetQuoteApi?' + new URLSearchParams({
                    functionName: 'getSymbolDerivativesData',
                    symbol: symbol,
                    instrumentType: 'OPT',
                    optionType: optionType,
                    expiryDt: formatExpiryForApi(expiryDt)
                });
                return fetchJson(url);
            }

            function getOpenLow(row) {
                const open = row.open_price ?? row.openPrice ?? row.open ?? null;
                const low = row.low_price ?? row.lowPrice ?? row.low ?? null;
                if (open == null || low == null) return null;
                return { open: parseFloat(open), low: parseFloat(low) };
            }

            function getOpenHigh(row) {
                const open = row.open_price ?? row.openPrice ?? row.open ?? null;
                const high = row.high_price ?? row.highPrice ?? row.high ?? null;
                if (open == null || high == null) return null;
                return { open: parseFloat(open), high: parseFloat(high) };
            }

            function getLtp(row) {
                const v = row.ltp ?? row.lastPrice ?? row.ltP ?? row.last ?? row.close ?? null;
                if (v == null) return null;
                const n = parseFloat(v);
                return isNaN(n) ? null : n;
            }

            function getVolume(row) {
                const v = row.trade_quantity ?? row.totalTradedVolume ?? row.volume ?? row.tradedVolume ?? null;
                if (v == null) return null;
                const n = parseInt(v, 10);
                return isNaN(n) ? null : n;
            }

            function hasZeroValues(row) {
                const ltp = getLtp(row);
                if (ltp != null && ltp <= 0) return true;
                const vol = getVolume(row);
                if (vol != null && vol <= 0) return true;
                return false;
            }

            function extractAllRows(data) {
                const result = [];
                if (!data || typeof data !== 'object') return result;
                // Top-level data array
                if (Array.isArray(data.data)) result.push(...data.data);
                // All known section keys (FOSec, allSec, eqSec, etc.)
                const sectionKeys = ['FOSec', 'allSec', 'eqSec', 'sec'];
                for (const key of sectionKeys) {
                    const arr = data[key]?.data;
                    if (Array.isArray(arr)) result.push(...arr);
                }
                // Any other key whose value is an object with .data array
                for (const key of Object.keys(data)) {
                    if (sectionKeys.includes(key)) continue;
                    const arr = data[key]?.data;
                    if (Array.isArray(arr)) result.push(...arr);
                }
                // Dedupe by symbol so same row from multiple sections appears once
                const seen = new Set();
                return result.filter(function (row) {
                    const sym = row?.symbol ?? row?.Symbol ?? row?.symbolFull;
                    if (!sym || seen.has(sym)) return false;
                    seen.add(sym);
                    return true;
                });
            }

            function filterOpenEqualsLow(data) {
                const rows = extractAllRows(data);
                return rows.filter(row => {
                    if (!row || typeof row !== 'object') return false;
                    if (hasZeroValues(row)) return false;
                    const p = getOpenLow(row);
                    return p && p.open > 0 && p.open === p.low;
                });
            }

            function filterOpenEqualsHigh(data) {
                const rows = extractAllRows(data);
                return rows.filter(row => {
                    if (!row || typeof row !== 'object') return false;
                    if (hasZeroValues(row)) return false;
                    const p = getOpenHigh(row);
                    return p && p.open > 0 && p.open === p.high;
                });
            }

            function getOptOpen(d) {
                let open = d.open_price ?? d.openPrice ?? d.open ?? null;
                if (open != null) return parseFloat(open);
                const lp = d.lastPrice ?? null;
                const ch = d.change ?? null;
                if (lp != null && ch != null && !isNaN(lp) && !isNaN(ch))
                    return parseFloat(lp) - parseFloat(ch);
                return null;
            }

            function getOptLow(d, open) {
                const low = d.low_price ?? d.lowPrice ?? d.low ?? null;
                if (low != null) return parseFloat(low);
                return open;
            }

            function optionOpenEqualsLow(optData) {
                const open = optData.open_price ?? optData.openPrice ?? optData.open ?? null;
                const low = optData.low_price ?? optData.lowPrice ?? optData.low ?? null;
                if (open != null && low != null) return parseFloat(open) === parseFloat(low);
                const computedOpen = getOptOpen(optData);
                if (computedOpen == null) return false;
                const ch = optData.change ?? null;
                if (ch != null && !isNaN(ch) && parseFloat(ch) >= 0) return true;
                if (low != null) return computedOpen === parseFloat(low);
                return false;
            }

            /** Get strikes where open=low. Works with GetQuoteApi format { data: [...] } or legacy { records: { data: [{CE/PE}] } } */
            function getOpenEqualsLowStrikes(oc, type) {
                const uv = parseFloat(oc?.records?.underlyingValue ?? oc?.data?.[0]?.underlyingValue ?? 0);
                let list = [];
                if (Array.isArray(oc?.data)) {
                    for (const optData of oc.data) {
                        if (!optionOpenEqualsLow(optData)) continue;
                        const strike = parseFloat(String(optData.strikePrice || 0).trim());
                        list.push({ strike, data: optData });
                    }
                } else {
                    const data = oc?.records?.data ?? [];
                    const key = type === 'CE' ? 'CE' : 'PE';
                    for (const r of data) {
                        const optData = r[key] ?? {};
                        if (!optData || Object.keys(optData).length === 0) continue;
                        if (!optionOpenEqualsLow(optData)) continue;
                        const strike = parseFloat(r.strikePrice ?? 0);
                        list.push({ strike, data: optData });
                    }
                }
                list.sort((a, b) => Math.abs(a.strike - uv) - Math.abs(b.strike - uv));
                const nearest = list.slice(0, 8);
                nearest.sort((a, b) => a.strike - b.strike);
                return nearest;
            }

            function optVal(d, ...keys) {
                for (const k of keys) if (d[k] != null) return d[k];
                return '—';
            }

            function optValFmt(d, ...keys) {
                return fmt(optVal(d, ...keys));
            }

            function optDisplayOpen(d) {
                const v = getOptOpen(d);
                return v != null ? v.toFixed(2) : '—';
            }

            function optDisplayLow(d) {
                const open = getOptOpen(d);
                const low = getOptLow(d, open);
                return low != null ? low.toFixed(2) : '—';
            }

            function optDisplayHigh(d) {
                const high = d.high_price ?? d.highPrice ?? d.high ?? null;
                return high != null ? parseFloat(high).toFixed(2) : '—';
            }

            function getField(row, ...keys) {
                for (const k of keys) if (row[k] != null) return row[k];
                return '—';
            }

            async function fetchOptionChainForRow(row, expiryOverride, optionType) {
                const symbol = row.symbol ?? row.Symbol ?? row.symbolFull ?? null;
                if (!symbol) return null;

                let contractInfo;
                try {
                    contractInfo = await fetchOptionChainContractInfo(symbol);
                } catch (e) {
                    return { error: e.message || 'Failed to fetch contract info' };
                }

                if (contractInfo?.error || !contractInfo?.expiryDates?.length)
                    return { error: contractInfo?.error ?? 'No expiry dates' };

                const expiryDates = contractInfo.expiryDates;
                let expiry = expiryOverride;
                if (!expiry) expiry = expiryDates[0];
                else if (!expiryDates.includes(expiry)) expiry = expiryDates[0];
                const expiryFormatted = formatExpiryForApi(expiry);

                try {
                    const res = await fetchSymbolDerivativesData(symbol, optionType || 'CE', expiryFormatted);
                    if (res?.error) return { error: res.error, expiry };
                    return { ...res, expiry, allExpiries: expiryDates };
                } catch (e) {
                    return { error: e.message || 'Failed to fetch derivatives', expiry };
                }
            }

            function sleep(ms) {
                return new Promise(r => setTimeout(r, ms));
            }

            /** Parse assets/lot_size.csv and return Map<symbolUpperCase, lotSize> */
            async function loadLotSizeMap() {
                try {
                    const res = await fetch('assets/lot_size.csv');
                    if (!res.ok) return new Map();
                    const text = await res.text();
                    const lines = text.trim().split(/\r?\n/);
                    if (lines.length < 2) return new Map();
                    const header = lines[0];
                    const cols = header.split(',').map(s => s.replace(/^"|"$/g, '').trim());
                    const symIdx = cols.indexOf('Symbol');
                    const lotColNames = cols.filter(c => /Lot Size/i.test(c));
                    const lotIdx = lotColNames.length ? cols.indexOf(lotColNames[lotColNames.length - 1]) : -1;
                    if (symIdx < 0 || lotIdx < 0) return new Map();
                    const map = new Map();
                    for (let i = 1; i < lines.length; i++) {
                        const parts = lines[i].split(',').map(s => s.replace(/^"|"$/g, '').trim());
                        const sym = (parts[symIdx] || '').toUpperCase();
                        const lot = parts[lotIdx];
                        if (sym && lot) map.set(sym, lot);
                    }
                    return map;
                } catch (e) {
                    return new Map();
                }
            }

            function esc(s) {
                const div = document.createElement('div');
                div.textContent = s;
                return div.innerHTML;
            }

            function fmt(val) {
                if (val == null || val === '' || val === '—') return '—';
                const n = parseFloat(val);
                return isNaN(n) ? '—' : n.toFixed(2);
            }

            function fmtVolume(val) {
                if (val == null || val === '') return '—';
                const n = parseInt(val, 10);
                if (isNaN(n)) return '—';
                return n.toLocaleString('en-IN');
            }

            function thSort(label, col, sortState) {
                const s = sortState;
                const isSorted = s && s.col === col;
                const ind = isSorted ? (s.asc ? ' ▲' : ' ▼') : '';
                return '<th class="sortable" data-sort="' + esc(col) + '" style="text-align:center;">' + esc(label) + ind + '</th>';
            }

            function renderGainersTable(rows, selectedExpiry, lotSizeMap) {
                lotSizeMap = lotSizeMap || new Map();
                let withExpiry = rows.filter(row => {
                    const oc = row._optionChain;
                    return oc && !oc.error && (oc.expiry || (oc.allExpiries && oc.allExpiries.length > 0));
                });
                withExpiry = sortRows(withExpiry, sortGainers.col, sortGainers.asc, lotSizeMap);
                if (!withExpiry.length) {
                    return '<p class="no-data">No gainers with open price = low price (with expiry) at the moment.</p>';
                }
                let html = '<table><thead><tr>';
                html += thSort('Symbol', 'symbol', sortGainers) + thSort('Lot Size', 'lotSize', sortGainers) + thSort('Open', 'open', sortGainers) + thSort('Low', 'low', sortGainers) + thSort('High', 'high', sortGainers) + thSort('Last / LTP', 'ltp', sortGainers) + thSort('Change %', 'pct', sortGainers) + thSort('Volume', 'volume', sortGainers) + '<th style="text-align:center;">Options</th>';
                html += '</tr></thead><tbody>';
                for (const row of withExpiry) {
                    const oc = row._optionChain ?? null;
                    const symbol = esc(getField(row, 'symbol', 'Symbol', 'symbolFull'));
                    const symKey = (getField(row, 'symbol', 'Symbol', 'symbolFull') || '').toString().toUpperCase();
                    const lotSize = lotSizeMap.get(symKey) || '—';
                    const open = esc(fmt(getField(row, 'open_price', 'openPrice', 'open')));
                    const low = esc(fmt(getField(row, 'low_price', 'lowPrice', 'low')));
                    const high = esc(fmt(getField(row, 'high_price', 'highPrice', 'high')));
                    const ltp = esc(fmt(getField(row, 'ltp', 'lastPrice', 'ltP', 'last', 'close')));
                    const pct = getField(row, 'pChange', 'perChange', 'percentChange');
                    const pctClass = (typeof pct === 'number' || (pct !== '—' && !isNaN(pct))) && parseFloat(pct) >= 0 ? 'positive' : 'negative';
                    const volume = esc(fmtVolume(getField(row, 'trade_quantity', 'totalTradedVolume', 'volume', 'tradedVolume')));
                    html += `<tr><td class="symbol">${symbol}</td><td class="price">${esc(lotSize)}</td><td class="price">${open}</td><td class="price">${low}</td><td class="price">${high}</td><td class="price">${ltp}</td><td class="price ${pctClass}">${esc(fmt(pct))}%</td><td class="price">${volume}</td><td class="options-cell">`;
                    if (oc && !oc.error) {
                        const strikes = getOpenEqualsLowStrikes(oc, 'CE');
                        html += `<span class="options-toggle" onclick="this.nextElementSibling.classList.toggle('show')">Exp: ${esc(oc.expiry ?? '')} · CE (open=low)</span>`;
                        html += '<div class="options-detail">';
                        if (!strikes.length) {
                            html += '<span style="color:#8b949e">No CE with open=low</span>';
                        } else {
                            html += '<div class="opt-row opt-header"><span>Strike</span><span>Open</span><span>Low</span><span>Current</span><span>High</span></div>';
                            for (const s of strikes) {
                                const d = s.data;
                                html += `<div class="opt-row"><span>${parseFloat(s.strike).toFixed(2)}</span><span>${esc(optDisplayOpen(d))}</span><span>${esc(optDisplayLow(d))}</span><span class="opt-current">${esc(optValFmt(d, 'lastPrice', 'sellPrice1', 'buyPrice1'))}</span><span class="opt-high">${esc(optDisplayHigh(d))}</span></div>`;
                            }
                        }
                        html += '</div>';
                    } else {
                        html += `<span style="color:#8b949e">${esc(oc?.error ?? '—')}</span>`;
                    }
                    html += '</td></tr>';
                }
                html += '</tbody></table>';
                return html;
            }

            function renderLosersTable(rows, lotSizeMap) {
                lotSizeMap = lotSizeMap || new Map();
                let withExpiry = rows.filter(row => {
                    const oc = row._optionChain;
                    return oc && !oc.error && (oc.expiry || (oc.allExpiries && oc.allExpiries.length > 0));
                });
                withExpiry = sortRows(withExpiry, sortLosers.col, sortLosers.asc, lotSizeMap);
                if (!withExpiry.length) {
                    return '<p class="no-data">No losers with open price = high price (with expiry) at the moment.</p>';
                }
                let html = '<table><thead><tr>';
                html += thSort('Symbol', 'symbol', sortLosers) + thSort('Lot Size', 'lotSize', sortLosers) + thSort('Open', 'open', sortLosers) + thSort('Low', 'low', sortLosers) + thSort('High', 'high', sortLosers) + thSort('Last / LTP', 'ltp', sortLosers) + thSort('Change %', 'pct', sortLosers) + thSort('Volume', 'volume', sortLosers) + '<th style="text-align:center;">Options</th>';
                html += '</tr></thead><tbody>';
                for (const row of withExpiry) {
                    const oc = row._optionChain ?? null;
                    const symbol = esc(getField(row, 'symbol', 'Symbol', 'symbolFull'));
                    const symKey = (getField(row, 'symbol', 'Symbol', 'symbolFull') || '').toString().toUpperCase();
                    const lotSize = lotSizeMap.get(symKey) || '—';
                    const open = esc(fmt(getField(row, 'open_price', 'openPrice', 'open')));
                    const low = esc(fmt(getField(row, 'low_price', 'lowPrice', 'low')));
                    const high = esc(fmt(getField(row, 'high_price', 'highPrice', 'high')));
                    const ltp = esc(fmt(getField(row, 'ltp', 'lastPrice', 'ltP', 'last', 'close')));
                    const pct = getField(row, 'pChange', 'perChange', 'percentChange');
                    const pctClass = (typeof pct === 'number' || (pct !== '—' && !isNaN(pct))) && parseFloat(pct) >= 0 ? 'positive' : 'negative';
                    const volume = esc(fmtVolume(getField(row, 'trade_quantity', 'totalTradedVolume', 'volume', 'tradedVolume')));
                    html += `<tr><td class="symbol">${symbol}</td><td class="price">${esc(lotSize)}</td><td class="price">${open}</td><td class="price">${low}</td><td class="price">${high}</td><td class="price">${ltp}</td><td class="price ${pctClass}">${esc(fmt(pct))}%</td><td class="price">${volume}</td><td class="options-cell">`;
                    if (oc && !oc.error) {
                        const strikes = getOpenEqualsLowStrikes(oc, 'PE');
                        html += `<span class="options-toggle" onclick="this.nextElementSibling.classList.toggle('show')">Exp: ${esc(oc.expiry ?? '')} · PE (open=low)</span>`;
                        html += '<div class="options-detail">';
                        if (!strikes.length) {
                            html += '<span style="color:#8b949e">No PE with open=low</span>';
                        } else {
                            html += '<div class="opt-row opt-header"><span>Strike</span><span>Open</span><span>Low</span><span>Current</span><span>High</span></div>';
                            for (const s of strikes) {
                                const d = s.data;
                                html += `<div class="opt-row"><span>${parseFloat(s.strike).toFixed(2)}</span><span>${esc(optDisplayOpen(d))}</span><span>${esc(optDisplayLow(d))}</span><span class="opt-current">${esc(optValFmt(d, 'lastPrice', 'sellPrice1', 'buyPrice1'))}</span><span class="opt-high">${esc(optDisplayHigh(d))}</span></div>`;
                            }
                        }
                        html += '</div>';
                    } else {
                        html += `<span style="color:#8b949e">${esc(oc?.error ?? '—')}</span>`;
                    }
                    html += '</td></tr>';
                }
                html += '</tbody></table>';
                return html;
            }

            function showError(msg) {
                document.getElementById('error-container').innerHTML = '<div class="error-msg">' + esc(msg) + '</div>';
            }

            function clearError() {
                document.getElementById('error-container').innerHTML = '';
            }

            function setTopLoading(show, text) {
                const el = document.getElementById('top-loading');
                const textEl = document.getElementById('top-loading-text');
                if (!el || !textEl) return;
                if (show) {
                    el.classList.remove('hidden');
                    if (text != null) textEl.textContent = text;
                } else {
                    el.classList.add('hidden');
                }
            }

            const hasExpiry = (row) => { const oc = row._optionChain; return oc && !oc.error && (oc.expiry || (oc.allExpiries && oc.allExpiries.length > 0)); };

            let cachedGainers = [];
            let cachedLosers = [];
            let cachedLotSizeMap = null;
            let cachedSelectedExpiry = null;
            let sortGainers = { col: null, asc: true };
            let sortLosers = { col: null, asc: true };

            const COLS = ['symbol', 'lotSize', 'open', 'low', 'high', 'ltp', 'pct', 'volume'];

            function getSortVal(row, col, lotSizeMap) {
                const get = (r, ...k) => { for (const x of k) if (r[x] != null) return r[x]; return null; };
                const sym = (get(row, 'symbol', 'Symbol', 'symbolFull') || '').toString().toUpperCase();
                switch (col) {
                    case 'symbol': return sym.toLowerCase();
                    case 'lotSize': const lot = lotSizeMap?.get(sym); return lot != null ? parseInt(lot, 10) || 0 : -1;
                    case 'open': return parseFloat(get(row, 'open_price', 'openPrice', 'open')) || 0;
                    case 'low': return parseFloat(get(row, 'low_price', 'lowPrice', 'low')) || 0;
                    case 'high': return parseFloat(get(row, 'high_price', 'highPrice', 'high')) || 0;
                    case 'ltp': return parseFloat(get(row, 'ltp', 'lastPrice', 'ltP', 'last', 'close')) || 0;
                    case 'pct': return parseFloat(get(row, 'pChange', 'perChange', 'percentChange')) || 0;
                    case 'volume': return parseInt(get(row, 'trade_quantity', 'totalTradedVolume', 'volume', 'tradedVolume'), 10) || 0;
                    default: return 0;
                }
            }

            function sortRows(rows, col, asc, lotSizeMap) {
                if (!col) return rows;
                const arr = rows.slice();
                arr.sort((a, b) => {
                    const va = getSortVal(a, col, lotSizeMap);
                    const vb = getSortVal(b, col, lotSizeMap);
                    let cmp = 0;
                    if (typeof va === 'string') cmp = va.localeCompare(vb);
                    else cmp = va - vb;
                    return asc ? cmp : -cmp;
                });
                return arr;
            }

            async function loadData() {
                clearError();
                const expiryBar = document.getElementById('expiry-bar');
                const gainersMeta = document.getElementById('gainers-meta');
                const losersMeta = document.getElementById('losers-meta');
                const gainersContent = document.getElementById('gainers-content');
                const losersContent = document.getElementById('losers-content');

                setTopLoading(true, 'Fetching gainers...');

                try {
                    // Load lot size map in parallel (from assets/lot_size.csv)
                    const lotSizePromise = loadLotSizeMap();
                    const losersPromise = fetchNseData('loosers');
                    const gainersResult = await fetchNseData('gainers');

                    if (gainersResult?.error) {
                        setTopLoading(false);
                        showError('Error (Gainers): ' + (gainersResult.details || gainersResult.error));
                        return;
                    }

                    const filteredGainers = filterOpenEqualsLow(gainersResult);
                    const firstSymbol = filteredGainers[0]?.symbol ?? null;
                    let allExpiryDates = [];
                    if (firstSymbol) {
                        setTopLoading(true, 'Getting expiry dates...');
                        try {
                            const ci = await fetchOptionChainContractInfo(firstSymbol);
                            allExpiryDates = ci?.expiryDates ?? [];
                        } catch (e) { }
                    }

                    const params = new URLSearchParams(location.search);
                    let selectedExpiry = params.get('expiry') ?? null;
                    if (selectedExpiry && !allExpiryDates.includes(selectedExpiry)) selectedExpiry = allExpiryDates[0] ?? null;
                    if (!selectedExpiry && allExpiryDates.length) selectedExpiry = allExpiryDates[0];

                    const lotSizeMap = await lotSizePromise;

                    if (allExpiryDates.length) {
                        expiryBar.style.display = 'flex';
                        const select = document.getElementById('expiry');
                        select.innerHTML = allExpiryDates.map(ed =>
                            `<option value="${esc(ed)}" ${ed === selectedExpiry ? 'selected' : ''}>${esc(ed)}</option>`
                        ).join('');
                        select.onchange = () => {
                            const url = new URL(location.href);
                            url.searchParams.set('expiry', select.value);
                            location.href = url.toString();
                        };
                        document.getElementById('apply-expiry').onclick = () => document.getElementById('expiry').dispatchEvent(new Event('change'));
                    }

                    // Start loading gainers as soon as we have contract info (expiry) — don't wait for losers
                    setTopLoading(true, 'Loading gainers...');
                    gainersContent.innerHTML = '<p class="loading">Loading gainers...</p>';
                    losersContent.innerHTML = '<p class="loading">Waiting... (loading after gainers)</p>';
                    const totalG = filteredGainers.length;
                    let idx = 0;
                    for (const row of filteredGainers) {
                        row._optionChain = await fetchOptionChainForRow(row, selectedExpiry, 'CE');
                        idx++;
                        setTopLoading(true, totalG ? 'Loading gainers (' + idx + ' / ' + totalG + ')...' : 'Loading gainers...');
                        cachedGainers = filteredGainers;
                        cachedLotSizeMap = lotSizeMap;
                        cachedSelectedExpiry = selectedExpiry;
                        gainersContent.innerHTML = renderGainersTable(filteredGainers, selectedExpiry, lotSizeMap);
                        gainersMeta.textContent = 'F&O securities where opening price equals the day\'s low (' + filteredGainers.filter(hasExpiry).length + ' with expiry)';
                        await sleep(100);
                    }

                    cachedGainers = filteredGainers;
                    cachedLotSizeMap = lotSizeMap;
                    cachedSelectedExpiry = selectedExpiry;

                    // Now get losers (may already be resolved) and load losers section
                    const losersResult = await losersPromise;
                    if (losersResult?.error) {
                        setTopLoading(false);
                        showError('Error (Losers): ' + (losersResult.details || losersResult.error));
                        losersContent.innerHTML = '<p class="no-data">Failed to load losers.</p>';
                        return;
                    }
                    const filteredLosers = filterOpenEqualsHigh(losersResult);
                    cachedLosers = filteredLosers;

                    setTopLoading(true, 'Loading losers...');
                    losersContent.innerHTML = '<p class="loading">Loading losers...</p>';
                    const totalL = filteredLosers.length;
                    idx = 0;
                    for (const row of filteredLosers) {
                        row._optionChain = await fetchOptionChainForRow(row, selectedExpiry, 'PE');
                        idx++;
                        setTopLoading(true, totalL ? 'Loading losers (' + idx + ' / ' + totalL + ')...' : 'Loading losers...');
                        cachedLosers = filteredLosers;
                        losersContent.innerHTML = renderLosersTable(filteredLosers, lotSizeMap);
                        losersMeta.textContent = 'F&O securities where opening price equals the day\'s high (' + filteredLosers.filter(hasExpiry).length + ' with expiry)';
                        await sleep(100);
                    }

                    setTopLoading(false);
                    gainersMeta.textContent = 'F&O securities where opening price equals the day\'s low (' + filteredGainers.filter(hasExpiry).length + ' with expiry)';
                    losersMeta.textContent = 'F&O securities where opening price equals the day\'s high (' + filteredLosers.filter(hasExpiry).length + ' with expiry)';

                } catch (e) {
                    setTopLoading(false);
                    showError('Failed to load data: ' + (e.message || String(e)));
                    gainersMeta.textContent = 'Error loading data';
                    losersMeta.textContent = 'Error loading data';
                    gainersContent.innerHTML = '<p class="no-data">Error: ' + esc(e.message || String(e)) + '. NSE API may block browser requests (CORS). Try a PHP backend or CORS proxy.</p>';
                    losersContent.innerHTML = '';
                }
            }

            document.body.addEventListener('click', function (e) {
                const th = e.target.closest('th.sortable');
                if (!th) return;
                const col = th.getAttribute('data-sort');
                if (!col) return;
                const gainersContent = document.getElementById('gainers-content');
                const losersContent = document.getElementById('losers-content');
                if (th.closest('#gainers-content')) {
                    if (sortGainers.col === col) sortGainers.asc = !sortGainers.asc;
                    else { sortGainers.col = col; sortGainers.asc = true; }
                    gainersContent.innerHTML = renderGainersTable(cachedGainers, cachedSelectedExpiry, cachedLotSizeMap);
                } else if (th.closest('#losers-content')) {
                    if (sortLosers.col === col) sortLosers.asc = !sortLosers.asc;
                    else { sortLosers.col = col; sortLosers.asc = true; }
                    losersContent.innerHTML = renderLosersTable(cachedLosers, cachedLotSizeMap);
                }
            });

            (function () {
                var btn = document.getElementById('toggle-expand-options');
                if (btn) {
                    btn.onclick = function () {
                        var all = document.querySelectorAll('.options-detail');
                        var anyShown = Array.prototype.some.call(all, function (el) { return el.classList.contains('show'); });
                        if (anyShown) {
                            all.forEach(function (el) { el.classList.remove('show'); });
                            btn.textContent = 'Expand all';
                        } else {
                            all.forEach(function (el) { el.classList.add('show'); });
                            btn.textContent = 'Collapse all';
                        }
                    };
                }
            })();

            loadData();
        })();
    </script>
</body>

</html>
